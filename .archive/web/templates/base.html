<!DOCTYPE html>
<html lang="zh-CN" x-data="{ darkMode: localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches) }" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Life Index{% endblock %}</title>
    <script>
        (function () {
            const storedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const shouldUseDark = storedTheme === 'dark' || (!storedTheme && prefersDark);
            document.documentElement.classList.toggle('dark', shouldUseDark);
        })();
    </script>
    <!-- Tailwind CSS - Precompiled (no CDN dependency) -->
    <link rel="stylesheet" href="/static/css/tailwind.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/celestial.css">
    <link rel="stylesheet" href="/static/css/app.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="celestial min-h-screen transition-colors duration-200">
    <!-- Floating Glass Header Component -->
    {% include "components/header.html" %}
    
    <!-- Main content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-[44px]">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="mt-auto" style="border-top: 1px solid rgba(68, 72, 79, 0.15);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <p class="text-center text-sm" style="color: var(--color-on-surface-variant); opacity: 0.6;">Life Index — 你的人生档案馆</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    {% block extra_scripts %}{% endblock %}
    <script>
        // Global refresh button handler (in header, available on all pages)
        (() => {
            const refreshBtn = document.getElementById('refresh-index-btn');
            if (!refreshBtn) return;

            const icon = refreshBtn.querySelector('svg');
            const originalBtnStyle = refreshBtn.getAttribute('style');

            refreshBtn.addEventListener('mouseenter', () => {
                refreshBtn.style.boxShadow = '0 0 20px rgba(255, 231, 146, 0.25)';
                refreshBtn.style.color = 'var(--color-primary)';
            });

            refreshBtn.addEventListener('mouseleave', () => {
                if (!refreshBtn.dataset.loading) {
                    refreshBtn.setAttribute('style', originalBtnStyle);
                }
            });

            refreshBtn.addEventListener('click', async () => {
                if (refreshBtn.dataset.loading === 'true') return;

                refreshBtn.dataset.loading = 'true';
                icon.style.animation = 'spin 1s linear infinite';
                refreshBtn.style.color = 'var(--color-primary)';

                try {
                    const response = await fetch('/api/dashboard/refresh', { method: 'POST' });
                    const result = await response.json();

                    if (result.success) {
                        window.location.reload();
                    } else {
                        console.error('Refresh failed:', result);
                        refreshBtn.removeAttribute('data-loading');
                        icon.style.animation = '';
                        refreshBtn.setAttribute('style', originalBtnStyle);
                    }
                } catch (error) {
                    console.error('Refresh error:', error);
                    refreshBtn.removeAttribute('data-loading');
                    icon.style.animation = '';
                    refreshBtn.setAttribute('style', originalBtnStyle);
                }
            });

            // Add spin keyframes if not exists
            if (!document.getElementById('refresh-spin-style')) {
                const style = document.createElement('style');
                style.id = 'refresh-spin-style';
                style.textContent = '@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }';
                document.head.appendChild(style);
            }
        })();
    </script>
</body>
</html>
