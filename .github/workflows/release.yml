name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install build
      run: python -m pip install build

    - name: Sync bootstrap-manifest.json version
      run: |
        # Extract version from pyproject.toml
        VERSION=$(grep '^version =' pyproject.toml | sed 's/version = "//' | sed 's/"//')
        echo "Version from pyproject.toml: $VERSION"
        
        # Update bootstrap-manifest.json
        python -c "
        import json
        with open('bootstrap-manifest.json', 'r') as f:
            data = json.load(f)
        data['repo_version'] = '$VERSION'
        with open('bootstrap-manifest.json', 'w') as f:
            json.dump(data, f, indent=2)
        "
        
        # Verify
        echo "Updated bootstrap-manifest.json repo_version to: $VERSION"

    - name: Build
      run: python -m build

    - name: Store artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/life-index
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release create '${{ github.ref_name }}'
        --repo '${{ github.repository }}'
        --generate-notes
        dist/*
