name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  doc-sync:
    runs-on: ubuntu-latest
    name: Documentation Sync Check
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Run documentation sync check
      run: python .github/scripts/check_doc_sync.py

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Cache pip packages
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-timeout
        pip install -e ".[dev,web]"

    - name: Lint with flake8
      run: |
        flake8 tools/ --count --max-complexity=40 --max-line-length=100 --show-source --statistics

    - name: Format check with black
      run: |
        black --check --diff tools/

    - name: Security scan with bandit
      run: |
        pip install bandit
        bandit -r tools/ -ll --skip B101,B311

  typecheck:
    runs-on: ubuntu-latest
    name: Type Check
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Cache pip packages
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-timeout
        pip install -e ".[dev,web]"

    - name: Type check with mypy
      run: |
        mypy tools/ --ignore-missing-imports

  tests:
    runs-on: ${{ matrix.os }}
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs:
    - lint
    - typecheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-timeout
        pip install -e ".[dev,web]"

    - name: Test with pytest
      run: |
        pytest tests/ -v --capture=tee-sys --durations=20 --timeout=300 --cov=tools --cov-report=term
