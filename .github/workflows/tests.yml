name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  blocker:
    runs-on: ${{ matrix.os }}
    name: Blocker Gate (${{ matrix.os }}, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install -e ".[dev]"

      - name: Run blocker tests
        run: pytest -m blocker -v --timeout=120

  contract:
    runs-on: ubuntu-latest
    name: Contract Gate (CLI contract / snapshot)
    env:
      LIFE_INDEX_INDEX_FTS_ONLY: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install -e ".[dev]"

      - name: Run contract tests
        run: pytest -m contract -v --timeout=120

  quarantine:
    runs-on: ubuntu-latest
    name: Quarantine Gate (flaky / env-dependent)
    continue-on-error: true
    env:
      LIFE_INDEX_INDEX_FTS_ONLY: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install -e ".[dev]"

      - name: Run quarantine tests
        run: pytest -m quarantine -v --timeout=300

  coverage:
    runs-on: ubuntu-latest
    name: Coverage Report
    continue-on-error: true
    env:
      LIFE_INDEX_INDEX_FTS_ONLY: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          pip install -e ".[dev]"

      - name: Generate coverage report
        # Report-only during gate migration. Runs blocker+contract to get
        # deterministic coverage. Restore --cov-fail-under once stable.
        run: |
          pytest -m "blocker or contract" -v --timeout=300 \
            --cov=tools --cov-report=term-missing --cov-fail-under=0

  search-eval-gate:
    runs-on: ubuntu-latest
    name: Search Eval Quality Gate
    env:
      LIFE_INDEX_INDEX_FTS_ONLY: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install -e ".[dev]"

      - name: Run search eval quality gate
        run: |
          pytest tests/unit/test_eval_gate.py tests/unit/test_eval_runner.py tests/unit/test_eval_llm.py tests/eval/test_broad_eval_soft_gate.py tests/eval/test_semantic_report.py tests/eval/test_eval_compare.py tests/eval/test_eval_run.py tests/eval/test_eval_qrels.py tests/eval/test_eval_export.py tests/eval/test_eval_serialization.py -v --timeout=120
