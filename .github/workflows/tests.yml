name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  blocker:
    runs-on: ${{ matrix.os }}
    name: Blocker Gate (${{ matrix.os }}, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install -e ".[dev]"

      - name: Run blocker tests
        run: pytest -m blocker -v --timeout=120

  contract:
    runs-on: ubuntu-latest
    name: Contract Gate (CLI contract / snapshot)
    continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install -e ".[dev]"

      - name: Run contract tests
        # TODO: Contract tests fail on CI due to mock patching not intercepting
        # imports (pytest-cov interference suspected). Remove continue-on-error
        # once root cause is fixed.
        run: pytest -m contract -v --timeout=120

  quarantine:
    runs-on: ubuntu-latest
    name: Quarantine Gate (flaky / env-dependent)
    continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install -e ".[dev]"

      - name: Run quarantine tests
        run: pytest -m quarantine -v --timeout=300

  coverage:
    runs-on: ubuntu-latest
    name: Coverage Report
    continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          pip install -e ".[dev]"

      - name: Generate coverage report
        # Report-only during gate migration. Runs blocker+contract to get
        # deterministic coverage. Restore --cov-fail-under once stable.
        run: |
          pytest -m "blocker or contract" -v --timeout=300 \
            --cov=tools --cov-report=term-missing

  search-eval-gate:
    runs-on: ubuntu-latest
    name: Search Eval Quality Gate

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install -e ".[dev]"

      - name: Run search eval quality gate
        run: |
          pytest tests/unit/test_eval_gate.py tests/unit/test_eval_runner.py tests/unit/test_eval_llm.py -v --timeout=120
