# Life Index E2E 测试 - Phase 1: 核心工作流覆盖
# 执行方式: Agent 读取本文件，按 test_cases 顺序逐一执行

test_suite:
  name: "Phase 1 - 核心工作流覆盖"
  version: "1.0"
  executor: "Agent"
  cleanup_after_test: true  # 测试后删除生成的日志

performance_metrics:
  - step: "parse"           # 语义解析时间
    description: "自然语言解析与元数据提取"
  - step: "weather_query"   # 天气查询时间（如有）
    description: "调用 query_weather.py"
  - step: "write_journal"   # 日志写入时间
    description: "调用 write_journal.py"
  - step: "total"           # 总时间
    description: "端到端总耗时"

test_cases:
  - id: "E2E-01"
    name: "极速记录模式 - 自动填充天气"
    priority: "P1"
    description: "用户仅提供 content，不提供 location/weather，验证工具自动填充默认值和查询天气"
    input:
      user_prompt: "记日志：今天测试极速记录模式，不关注地点和天气"
      extract:
        date: "2026-03-06"
        title: "测试极速记录"
        content: "今天测试极速记录模式，不关注地点和天气"
        topic: "test"
    expected:
      success: true
      journal_created: true
      location_auto_filled: true       # 标记为自动填充
      needs_confirmation: true         # 需要用户确认
      confirmation_message: "(包含地点和天气信息)"
    performance_sla:
      parse: "< 500ms"
      weather_query: "< 3s"            # 天气查询时间
      write_journal: "< 1s"
      total: "< 5s"

  - id: "E2E-02"
    name: "补全模式"
    priority: "P1"
    description: "先记录日志（使用默认地点），后使用 edit_journal.py 同时补充正确地点和天气"
    steps:
      - step: 1
        name: "初始记录"
        action: "write_journal"
        data:
          date: "2026-03-06"
          title: "测试补全模式"
          content: "初始记录，待补充地点和天气"
          topic: "test"
        expected:
          success: true
          location_auto_filled: true
          needs_confirmation: true
      - step: 2
        name: "补充元数据"
        action: "edit_journal"
        use_last_created: true
        operations:
          - set_location: "Beijing, China"
          - set_weather: "晴天"
        expected:
          success: true
          final_location: "Beijing, China"
          final_weather: "晴天"
    performance_sla:
      step1_write: "< 1s"
      step2_edit: "< 1s"
      total: "< 3s"

  - id: "E2E-03"
    name: "同一天多条日志"
    priority: "P1"
    description: "同一天记录多条日志，验证序列号递增（_001 → _002 → _003）"
    steps:
      - step: 1
        name: "第一条日志"
        action: "write_journal"
        data:
          date: "2026-03-06"
          title: "第一条测试日志"
          content: "这是今天的第一条日志"
          topic: "test"
      - step: 2
        name: "第二条日志"
        action: "write_journal"
        data:
          date: "2026-03-06"
          title: "第二条测试日志"
          content: "这是今天的第二条日志"
          topic: "test"
      - step: 3
        name: "第三条日志"
        action: "write_journal"
        data:
          date: "2026-03-06"
          title: "第三条测试日志"
          content: "这是今天的第三条日志"
          topic: "test"
    expected:
      step1_file: "life-index_2026-03-06_001.md"
      step2_file: "life-index_2026-03-06_002.md"
      step3_file: "life-index_2026-03-06_003.md"
    performance_sla:
      each_write: "< 1s"
      total: "< 5s"

  - id: "E2E-04"
    name: "附件重名处理"
    priority: "P1"
    description: "同一附件多次记录，验证自动重命名（_001, _002）"
    prerequisite: "准备测试附件文件"
    steps:
      - step: 1
        name: "第一次使用附件"
        action: "write_journal"
        data:
          date: "2026-03-06"
          title: "附件测试一"
          content: "第一次使用相同附件"
          topic: "test"
          attachments:
            - source_path: "C:/Users/{username}/Downloads/full_circle_sketch.png"
              description: "测试附件"
      - step: 2
        name: "第二次使用相同附件"
        action: "write_journal"
        data:
          date: "2026-03-06"
          title: "附件测试二"
          content: "第二次使用相同附件"
          topic: "test"
          attachments:
            - source_path: "C:/Users/{username}/Downloads/full_circle_sketch.png"
              description: "测试附件"
    expected:
      step1_attachment: "full_circle_sketch.png"
      step2_attachment: "full_circle_sketch_001.png"  # 自动重命名
    performance_sla:
      each_write: "< 2s"  # 包含附件复制
      total: "< 5s"

  - id: "E2E-05"
    name: "地点自动规范化"
    priority: "P1"
    description: "用户只提供城市名（如'北京'），验证工具自动推断国家并查询天气"
    input:
      user_prompt: "记日志：今天在北京开会，讨论项目进展"
      extract:
        date: "2026-03-06"
        title: "北京项目会议"
        content: "今天在北京开会，讨论项目进展"
        location: "北京"                    # 用户只提供城市名
        topic: "work"
    expected:
      success: true
      journal_created: true
      location: "北京"
      location_auto_filled: false
      needs_confirmation: false
    performance_sla:
      parse: "< 500ms"
      weather_query: "< 3s"
      write_journal: "< 1s"
      total: "< 5s"

  - id: "E2E-06"
    name: "天气确认流程 - 用户修改地点"
    priority: "P1"
    description: "写入后用户确认地点/天气，用户同时修改地点和天气，完成修正"
    steps:
      - step: 1
        name: "初始记录（默认地点）"
        action: "write_journal"
        data:
          date: "2026-03-06"
          title: "测试确认流程"
          content: "初始记录，使用默认地点"
          topic: "test"
        expected:
          success: true
          needs_confirmation: true           # 需要确认
      - step: 2
        name: "用户修改地点和天气"
        action: "edit_journal"
        use_last_created: true
        operations:
          - set_location: "上海，中国"       # 用户修改为上海
          - set_weather: "小雨，22°C"
        expected:
          success: true
          final_location: "上海，中国"
          final_weather: "小雨，22°C"
    performance_sla:
      step1_write: "< 5s"                  # 包含天气查询
      step2_edit: "< 1s"
      total: "< 7s"

  - id: "E2E-07"
    name: "天气确认流程 - 用户同时修改地点和天气"
    priority: "P1"
    description: "写入后用户同时提供地点和天气，验证直接使用用户值"
    steps:
      - step: 1
        name: "初始记录（默认地点）"
        action: "write_journal"
        data:
          date: "2026-03-06"
          title: "测试确认流程2"
          content: "初始记录，使用默认地点"
          topic: "test"
        expected:
          success: true
          needs_confirmation: true
      - step: 2
        name: "用户同时修改地点和天气"
        action: "edit_journal"
        use_last_created: true
        operations:
          - set_location: "深圳，中国"
          - set_weather: "暴雨，25°C"        # 用户明确提供天气
        expected:
          success: true
          final_location: "深圳，中国"
          final_weather: "暴雨，25°C"        # 使用用户提供的值
    performance_sla:
      step1_write: "< 5s"
      step2_edit: "< 1s"                   # 不查询天气，直接更新
      total: "< 7s"

  - id: "E2E-08"
    name: "默认地点写入后修正地址和天气"
    priority: "P1"
    description: "先用默认地点写入，再通过 edit_journal 同步修正地点和天气"
    steps:
      - step: 1
        name: "默认地点写入"
        action: "write_journal"
        data:
          date: "2026-03-07"
          title: "默认地点修正测试"
          content: "今天先快速记一下，地点后面再改。"
          topic: "test"
        expected:
          success: true
          location_auto_filled: true
          needs_confirmation: true
      - step: 2
        name: "同步修正地点和天气"
        action: "edit_journal"
        use_last_created: true
        operations:
          - set_location: "Beijing, China"
          - set_weather: "Cloudy 18°C"
        expected:
          success: true
          final_location: "Beijing, China"
          final_weather: "Cloudy 18°C"
    performance_sla:
      step1_write: "< 5s"
      step2_edit: "< 1s"
      total: "< 7s"

  - id: "E2E-09"
    name: "天气查询失败后手动兜底修正"
    priority: "P1"
    description: "写入阶段天气查询失败后，允许通过手动提供天气完成地点修正"
    steps:
      - step: 1
        name: "默认地点写入且天气为空"
        action: "write_journal"
        data:
          date: "2026-03-08"
          title: "手动天气兜底测试"
          content: "先记日志，天气稍后补。"
          weather: ""
          topic: "test"
        expected:
          success: true
          location_auto_filled: true
          needs_confirmation: true
      - step: 2
        name: "手动提供天气完成修正"
        action: "edit_journal"
        use_last_created: true
        operations:
          - set_location: "Shanghai, China"
          - set_weather: "Manual fallback: Clear 26°C"
        expected:
          success: true
          final_location: "Shanghai, China"
          final_weather: "Manual fallback: Clear 26°C"
    performance_sla:
      step1_write: "< 5s"
      step2_edit: "< 1s"
      total: "< 7s"
