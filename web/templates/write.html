{% extends "base.html" %}

{% block title %}写日志 - Life Index{% endblock %}

{% block content %}
<section class="max-w-7xl mx-auto space-y-8" id="write-page">
    <header class="space-y-3">
        <p class="type-label uppercase tracking-[0.24em]" style="color: var(--color-tertiary);">Write Journal</p>
        <h1 class="font-display text-3xl font-semibold tracking-tight sm:text-4xl" style="color: var(--color-on-surface);">写日志</h1>
        <p class="max-w-3xl text-sm sm:text-base" style="color: var(--color-on-surface-variant);">
            可以是一句感悟、一个链接，或者是一整篇日记...
        </p>
    </header>

    {% if error %}
    <div class="rounded-2xl p-4" style="background: rgba(255, 113, 108, 0.08); box-shadow: 0 0 0 1px rgba(255, 113, 108, 0.2);">
        <div class="flex items-center gap-3">
            <span class="text-xl">⚠️</span>
            <div>
                <h3 class="type-title" style="color: var(--color-error);">保存失败</h3>
                <p class="type-label" style="color: var(--color-error);">{{ error }}</p>
            </div>
        </div>
    </div>
    {% endif %}

    <article class="rounded-2xl p-6 sm:p-10" style="background: rgba(18, 22, 30, 0.82); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.28), 0 0 0 1px rgba(255, 255, 255, 0.05);">
        <form method="POST" action="/write" class="space-y-8" id="write-form" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <!-- Template Selector -->
            <div id="template-section" class="flex items-center gap-3 pb-4" style="border-bottom: 1px solid rgba(68, 72, 79, 0.1);">
                <span class="type-label" style="color: var(--color-on-surface-variant);">模板</span>
                <select id="template" class="pill px-3 py-1.5 type-body" name="template" data-templates='{{ templates_json | safe }}' style="background: var(--color-surface-container-low); border: none; color: var(--color-on-surface);">
                    {% for item in templates %}
                    <option value="{{ item.id }}" {% if selected_template == item.id %}selected{% endif %}>{{ item.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Title Input -->
            <div>
                <input
                    id="title"
                    name="title"
                    type="text"
                    value="{{ title }}"
                    placeholder="给这篇记录起个名字..."
                    class="w-full type-heading py-2"
                    style="color: var(--color-on-surface); background: transparent; border: none; border-bottom: 1px solid rgba(68, 72, 79, 0.2); outline: none; transition: border-color 0.2s;"
                    autocomplete="off"
                >
            </div>

            <!-- Content Textarea -->
            <div>
                <textarea
                    id="content"
                    name="content"
                    rows="12"
                    required
                    placeholder="今天发生了什么？写下你的想法、感受、经历..."
                    class="w-full rounded-2xl px-4 py-4 type-body"
                    style="line-height: 1.8; resize: vertical; min-height: 280px; background: var(--color-surface-container-low); border: 1px solid rgba(68, 72, 79, 0.15); color: var(--color-on-surface);"
                >{{ content }}</textarea>
            </div>

            <!-- AI Status Notice -->
            <div id="ai-status-notice" class="flex items-center gap-2 text-sm" style="color: var(--color-on-surface-variant);">
                <span id="ai-status-icon">✨</span>
                <span id="ai-status-text">正在检测 AI 服务...</span>
            </div>

            <!-- Metadata Grid -->
            <div id="metadata-section" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
                <!-- Topic -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">主题</label>
                    <select id="topic" name="topic" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                        <option value="" style="color: var(--color-on-surface-variant);">自动判断</option>
                        <option value="work" {% if topic == 'work' %}selected{% endif %}>工作</option>
                        <option value="learn" {% if topic == 'learn' %}selected{% endif %}>学习</option>
                        <option value="health" {% if topic == 'health' %}selected{% endif %}>健康</option>
                        <option value="relation" {% if topic == 'relation' %}selected{% endif %}>关系</option>
                        <option value="think" {% if topic == 'think' %}selected{% endif %}>思考</option>
                        <option value="create" {% if topic == 'create' %}selected{% endif %}>创作</option>
                        <option value="life" {% if topic == 'life' %}selected{% endif %}>生活</option>
                    </select>
                </div>

                <!-- Mood -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">心情</label>
                    <input id="mood" name="mood" type="text" value="{{ mood }}" placeholder="如：专注, 充实" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                </div>

                <!-- Tags -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">标签</label>
                    <input id="tags" name="tags" type="text" value="{{ tags }}" placeholder="如：亲子, 回忆" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                </div>

                <!-- People -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">人物</label>
                    <input id="people" name="people" type="text" value="{{ people }}" placeholder="如：乐乐, 爸爸" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                </div>

                <!-- Location -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">地点</label>
                    <div class="flex items-center gap-2">
                        <input id="location" name="location" type="text" value="{{ location }}" placeholder="如：Beijing, China" class="block w-full flex-1 rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                        <button id="geolocation-btn" type="button" data-idle-text="定位" class="px-4 py-2.5 rounded-full text-sm font-medium transition-all" style="background: var(--color-surface-container); border: none; box-shadow: 0 2px 8px rgba(133, 255, 242, 0.15), inset 0 0 0 1px rgba(133, 255, 242, 0.3); color: var(--color-tertiary); height: 44px; white-space: nowrap;" onmouseover="this.style.background='rgba(133, 255, 242, 0.12)'; this.style.boxShadow='0 4px 16px rgba(133, 255, 242, 0.25), inset 0 0 0 1px rgba(133, 255, 242, 0.5)'" onmouseout="this.style.background='var(--color-surface-container)'; this.style.boxShadow='0 2px 8px rgba(133, 255, 242, 0.15), inset 0 0 0 1px rgba(133, 255, 242, 0.3)'">
                            <span class="flex items-center gap-1.5">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                                定位
                            </span>
                        </button>
                    </div>
                    <p class="mt-1 text-xs" style="color: var(--color-on-surface-variant);">如不填写地点和天气，将使用默认地点并查询天气数据</p>
                </div>

                <!-- Weather -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">天气</label>
                    <div class="flex items-center gap-2">
                        <input id="weather" name="weather" type="text" value="{{ weather }}" placeholder="如：晴天 28°C" class="flex-1 rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                        <button id="weather-btn" type="button" data-idle-text="查询" class="px-4 py-2.5 rounded-full text-sm font-medium transition-all" style="background: var(--color-surface-container); border: none; box-shadow: 0 2px 8px rgba(255, 231, 146, 0.15), inset 0 0 0 1px rgba(255, 231, 146, 0.3); color: var(--color-primary); height: 44px; white-space: nowrap;" onmouseover="this.style.background='rgba(255, 231, 146, 0.12)'; this.style.boxShadow='0 4px 16px rgba(255, 231, 146, 0.25), inset 0 0 0 1px rgba(255, 231, 146, 0.5)'" onmouseout="this.style.background='var(--color-surface-container)'; this.style.boxShadow='0 2px 8px rgba(255, 231, 146, 0.15), inset 0 0 0 1px rgba(255, 231, 146, 0.3)'">
                            <span class="flex items-center gap-1.5">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19c0-1.7-1.3-3-3-3c-1.1 0-2.1.6-2.6 1.5c-.5-.9-1.5-1.5-2.6-1.5c-1.7 0-3 1.3-3 3"/><circle cx="12" cy="12" r="2"/><path d="M12 8v-2"/><path d="M12 18v-2"/><path d="M8 12H6"/><path d="M18 12h-2"/></svg>
                                查询
                            </span>
                        </button>
                    </div>
                    <p id="weather-status" class="mt-1 text-xs" style="color: var(--color-on-surface-variant);"></p>
                </div>

                <!-- Date -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">日期</label>
                    <input id="date" name="date" type="datetime-local" value="{{ date }}" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                </div>

                <!-- Project -->
                <div class="sm:col-span-2 lg:col-span-2">
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">项目</label>
                    <input id="project" name="project" type="text" value="{{ project }}" placeholder="如：LifeIndex, 育儿日记" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                </div>
            </div>

            <!-- Attachments -->
            <div id="attachments-section" class="rounded-xl p-5" style="background: var(--color-surface-container-low); box-shadow: 0 0 0 1px rgba(68, 72, 79, 0.1);">
                <h3 class="font-display text-xl font-medium tracking-tight mb-4" style="color: var(--color-on-surface);">附件</h3>

                <!-- Local files -->
                <div class="mb-4">
                    <input
                        id="local-file-input"
                        type="file"
                        name="attachments"
                        multiple
                        class="hidden"
                    >
                    <button type="button" id="file-select-btn" class="inline-flex items-center gap-2 rounded-full px-4 py-2.5 text-sm font-medium transition-all" style="background: var(--color-surface-container-high); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface-variant);" onmouseover="this.style.background='var(--color-surface-bright)'; this.style.boxShadow='inset 0 0 0 1px var(--color-primary)'" onmouseout="this.style.background='var(--color-surface-container-high)'; this.style.boxShadow='inset 0 0 0 1px rgba(68, 72, 79, 0.15)'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        选择文件
                    </button>
                    <!-- Selected files list -->
                    <div id="selected-files-list" class="mt-3 space-y-2"></div>
                </div>

                <!-- URL inputs -->
                <div>
                    <div id="url-inputs" class="space-y-2">
                        <div class="flex gap-2">
                            <input type="url" name="attachment_urls" placeholder="https://example.com/image.jpg" class="flex-1 rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                        </div>
                    </div>
                    <button id="add-url-btn" type="button" class="mt-2 type-label" style="color: var(--color-primary); background: none; border: none; cursor: pointer;">+ 添加更多</button>
                </div>
            </div>

            <!-- Submit Area -->
            <div id="submit-section" class="flex flex-col gap-3 pt-4 sm:flex-row sm:items-center sm:gap-4" style="border-top: 1px solid rgba(68, 72, 79, 0.1);">
                <button id="submit-btn" type="submit" data-idle-text="保存日志" class="inline-flex min-h-[46px] items-center justify-center rounded-full px-6 py-3 text-sm font-medium transition-transform active:scale-95" style="background: var(--color-primary); color: var(--color-background); box-shadow: 0 12px 28px rgba(255, 231, 146, 0.18);">
                    保存日志
                </button>
                <p id="form-status" class="type-label" style="color: var(--color-on-surface-variant);"></p>
            </div>
        </form>
    </article>
</section>

<style>
    /* Styled file input */
    .file-upload-styled::file-selector-button {
        background-color: var(--color-surface-container-high);
        color: var(--color-on-surface-variant);
        border: none;
        border-radius: 9999px;
        padding: 8px 16px;
        font-size: 0.75rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        margin-right: 12px;
        box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15);
    }

    .file-upload-styled::file-selector-button:hover {
        background-color: var(--color-surface-bright);
        box-shadow: inset 0 0 0 1px var(--color-primary);
    }
</style>

<script>
    (() => {
        const templateSelector = document.getElementById('template');
        const contentField = document.getElementById('content');
        const topicField = document.getElementById('topic');
        const geolocationBtn = document.getElementById('geolocation-btn');
        const weatherBtn = document.getElementById('weather-btn');
        const locationField = document.getElementById('location');
        const weatherField = document.getElementById('weather');
        const weatherStatus = document.getElementById('weather-status');
        const dateField = document.getElementById('date');
        const localFileInput = document.getElementById('local-file-input');
        const fileSelectBtn = document.getElementById('file-select-btn');
        const selectedFilesList = document.getElementById('selected-files-list');
        const writeForm = document.getElementById('write-form');
        const submitBtn = document.getElementById('submit-btn');
        const formStatus = document.getElementById('form-status');
        const urlInputs = document.getElementById('url-inputs');
        const addUrlBtn = document.getElementById('add-url-btn');

        const setButtonBusy = (button, busyText, isBusy) => {
            if (!button) return;
            // Store original innerHTML (preserving SVG icons) on first call
            if (!button._idleHTML) button._idleHTML = button.innerHTML;
            button.disabled = isBusy;
            if (isBusy) {
                button.textContent = busyText;
            } else {
                button.innerHTML = button._idleHTML;
            }
            button.style.opacity = isBusy ? '0.5' : '';
            button.style.cursor = isBusy ? 'not-allowed' : '';
        };

        const setWeatherStatus = (message, isError = false) => {
            if (!weatherStatus) return;
            weatherStatus.textContent = message;
            weatherStatus.style.color = isError ? 'var(--color-error)' : 'var(--color-on-surface-variant)';
        };

        const setFormStatus = (message, isError = false) => {
            if (!formStatus) return;
            formStatus.textContent = message;
            formStatus.style.color = isError ? 'var(--color-error)' : 'var(--color-on-surface-variant)';
        };

        const updateAttachmentStatus = () => {
            if (!urlInputs) return;
        };

        const buildUrlInput = () => {
            const row = document.createElement('div');
            row.className = 'flex gap-2';

            const input = document.createElement('input');
            input.type = 'url';
            input.name = 'attachment_urls';
            input.placeholder = 'https://example.com/image.jpg';
            input.className = 'flex-1 rounded-full px-4 py-2.5 text-sm';
            input.style.cssText = 'background: var(--color-surface); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);';

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'px-3 py-2 rounded-full text-sm font-medium transition-all';
            removeBtn.style.cssText = 'background: var(--color-surface-container-high); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface-variant); cursor: pointer;';
            removeBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
            removeBtn.title = '移除';
            removeBtn.addEventListener('click', () => {
                row.remove();
                if (urlInputs && urlInputs.children.length === 0) {
                    urlInputs.appendChild(buildUrlInput());
                }
            });

            row.appendChild(input);
            row.appendChild(removeBtn);
            return row;
        };

        // File input handling with semantic list display — SVG icons matching Celestial theme
        const getFileIcon = (filename) => {
            const ext = filename.split('.').pop().toLowerCase();
            const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'];
            const videoExts = ['mp4', 'mov', 'avi', 'mkv', 'webm'];
            const audioExts = ['mp3', 'wav', 'flac', 'aac', 'ogg'];
            const docExts = ['pdf', 'doc', 'docx', 'txt', 'md'];

            // SVG icons — minimal line style matching Celestial aesthetic
            const svgs = {
                image: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>',
                video: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2.5"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/><circle cx="18" cy="7" r="1.5" fill="currentColor"/></svg>',
                audio: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 5.42A5 5 0 0 1 19 12a5.55 0 011-3.42 6.58"/><path d="M19.07 4.93A10 10 0 0121 12a10 10 0 01-2.07 7.07"/></svg>',
                doc: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002h12a2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>',
                default: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2H6a2 0 00-2 2v16a2 0 002 12h12a2 0 002-2V9z"/><polyline points="13,2 13,9 20,9"/></svg>'
            };
            
            if (imageExts.includes(ext)) return svgs.image;
            if (videoExts.includes(ext)) return svgs.video;
            if (audioExts.includes(ext)) return svgs.audio;
            if (docExts.includes(ext)) return svgs.doc;
            return svgs.default;
        };

        const formatFileSize = (bytes) => {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        };

        const updateSelectedFilesList = () => {
            if (!selectedFilesList || !localFileInput) return;
            selectedFilesList.innerHTML = '';

            const files = localFileInput.files;
            if (!files || files.length === 0) return;

            Array.from(files).forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'flex items-center gap-3 rounded-xl px-3 py-2';
                item.style.cssText = 'background: var(--color-surface); box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.1);';

                const icon = document.createElement('span');
                icon.innerHTML = getFileIcon(file.name);
                icon.style.cssText = 'color: var(--color-on-surface-variant); display: flex; align-items: center;';

                const info = document.createElement('div');
                info.className = 'flex-1 min-w-0';

                const name = document.createElement('div');
                name.className = 'text-sm truncate';
                name.style.color = 'var(--color-on-surface)';
                name.textContent = file.name;
                name.title = file.name;

                const size = document.createElement('div');
                size.className = 'text-xs';
                size.style.color = 'var(--color-on-surface-variant)';
                size.textContent = formatFileSize(file.size);

                info.appendChild(name);
                info.appendChild(size);

                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'p-1.5 rounded-full transition-all';
                removeBtn.style.cssText = 'background: transparent; border: none; color: var(--color-on-surface-variant); cursor: pointer;';
                removeBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
                removeBtn.title = '移除';
                removeBtn.addEventListener('mouseover', () => {
                    removeBtn.style.background = 'rgba(255, 113, 108, 0.15)';
                    removeBtn.style.color = 'var(--color-error)';
                });
                removeBtn.addEventListener('mouseout', () => {
                    removeBtn.style.background = 'transparent';
                    removeBtn.style.color = 'var(--color-on-surface-variant)';
                });
                removeBtn.addEventListener('click', () => {
                    // Create new FileList without this file
                    const dt = new DataTransfer();
                    Array.from(files).forEach((f, i) => {
                        if (i !== index) dt.items.add(f);
                    });
                    localFileInput.files = dt.files;
                    updateSelectedFilesList();
                });

                item.appendChild(icon);
                item.appendChild(info);
                item.appendChild(removeBtn);
                selectedFilesList.appendChild(item);
            });
        };

        if (fileSelectBtn && localFileInput) {
            fileSelectBtn.addEventListener('click', () => {
                localFileInput.click();
            });
        }

        if (localFileInput) {
            localFileInput.addEventListener('change', updateSelectedFilesList);
        }

        const fetchWeatherForLocation = async () => {
            const location = locationField ? locationField.value.trim() : '';
            if (!location || !weatherField) {
                setWeatherStatus('请先填写地点', true);
                return false;
            }

            setButtonBusy(weatherBtn, '查询中...', true);
            setWeatherStatus('正在查询...');

            try {
                const params = new URLSearchParams({ location });
                if (dateField && dateField.value) params.set('date', dateField.value);

                const response = await fetch(`/api/weather?${params.toString()}`);
                const result = await response.json();
                if (result.success && result.weather) {
                    weatherField.value = result.weather;
                    setWeatherStatus('已填充');
                    return true;
                }
                setWeatherStatus(result.error || '查询失败', true);
                return false;
            } catch {
                setWeatherStatus('查询失败', true);
                return false;
            } finally {
                setButtonBusy(weatherBtn, '查询中...', false);
            }
        };

        if (locationField && weatherField) {
            locationField.addEventListener('input', () => {
                weatherField.value = '';
                setWeatherStatus('地点已更新');
            });
        }

        if (templateSelector && contentField && topicField) {
            const templates = JSON.parse(templateSelector.dataset.templates || '[]');
            templateSelector.addEventListener('change', () => {
                const selected = templates.find((item) => item.id === templateSelector.value);
                if (!selected) return;

                const existingContent = contentField.value.trim();
                const existingTopic = topicField.value.trim();
                if ((existingContent || existingTopic) && !confirm('切换模板可能覆盖未保存内容，是否继续？')) return;

                contentField.value = selected.content || '';
                if (Array.isArray(selected.topic) && selected.topic.length > 0) {
                    topicField.value = selected.topic[0];
                }
            });
        }

        if (geolocationBtn && locationField) {
            geolocationBtn.addEventListener('click', () => {
                if (!navigator.geolocation) {
                    alert('位置信息获取失败');
                    return;
                }

                setButtonBusy(geolocationBtn, '定位中...', true);
                setWeatherStatus('正在定位...');

                navigator.geolocation.getCurrentPosition(
                    async ({ coords }) => {
                        const fallback = `${coords.latitude.toFixed(4)}, ${coords.longitude.toFixed(4)}`;
                        try {
                            const params = new URLSearchParams({ lat: coords.latitude.toString(), lon: coords.longitude.toString() });
                            const response = await fetch(`/api/reverse-geocode?${params.toString()}`);
                            const result = await response.json();
                            locationField.value = result.success && result.location ? result.location : fallback;
                        } catch {
                            locationField.value = fallback;
                        }
                        if (weatherField) weatherField.value = '';
                        await fetchWeatherForLocation();
                        setButtonBusy(geolocationBtn, '定位中...', false);
                    },
                    () => {
                        setButtonBusy(geolocationBtn, '定位中...', false);
                        setWeatherStatus('定位失败', true);
                        alert('位置信息获取失败');
                    }
                );
            });
        }

        if (weatherBtn) {
            weatherBtn.addEventListener('click', async () => {
                const ok = await fetchWeatherForLocation();
                if (!ok && locationField && !locationField.value.trim()) alert('请先填写地点');
            });
        }

        if (addUrlBtn && urlInputs) {
            addUrlBtn.addEventListener('click', () => {
                urlInputs.appendChild(buildUrlInput());
            });
        }

        if (urlInputs) {
            const existingInputs = Array.from(urlInputs.querySelectorAll('input[name="attachment_urls"]'));
            existingInputs.forEach((input) => {
                if (input.parentElement === urlInputs) {
                    const row = buildUrlInput();
                    const replacementInput = row.querySelector('input[name="attachment_urls"]');
                    if (replacementInput) replacementInput.value = input.value;
                    input.replaceWith(row);
                }
            });
        }

        if (writeForm && submitBtn) {
            writeForm.addEventListener('submit', () => {
                setButtonBusy(submitBtn, '保存中...', true);
                setFormStatus('正在保存...');
            });
        }

        /* ============================
           Zen Typing Mode (沉浸输入态)
           DESIGN-DIRECTION §3.2
           ============================ */
        const zenEdgeThreshold = 20;
        const titleInput = document.getElementById('title');

        /* ============================
           AI Status Detection with 2-hour cache
           ============================ */
        const AI_STATUS_CACHE_KEY = 'life_index_ai_status';
        const AI_STATUS_CACHE_DURATION = 2 * 60 * 60 * 1000; // 2 hours in milliseconds

        const checkAIStatus = async () => {
            const aiStatusNotice = document.getElementById('ai-status-notice');
            const aiStatusIcon = document.getElementById('ai-status-icon');
            const aiStatusText = document.getElementById('ai-status-text');

            if (!aiStatusNotice || !aiStatusIcon || !aiStatusText) return;

            // Check cache first
            try {
                const cached = localStorage.getItem(AI_STATUS_CACHE_KEY);
                if (cached) {
                    const { available, timestamp } = JSON.parse(cached);
                    const age = Date.now() - timestamp;
                    if (age < AI_STATUS_CACHE_DURATION) {
                        // Use cached result
                        if (available) {
                            aiStatusIcon.textContent = '✨';
                            aiStatusText.textContent = 'AI 已启动，留空的元数据将由 AI 自动填写';
                            aiStatusNotice.style.color = 'var(--color-tertiary)';
                        } else {
                            aiStatusIcon.textContent = '○';
                            aiStatusText.textContent = 'AI 服务未配置，请手动填写元数据';
                            aiStatusNotice.style.color = 'var(--color-on-surface-variant)';
                        }
                        return;
                    }
                }
            } catch {
                // Cache parse error, continue to fetch
            }

            // Fetch fresh status
            try {
                const response = await fetch('/api/llm-status');
                const result = await response.json();
                const available = result.success && result.available;

                // Update cache
                localStorage.setItem(AI_STATUS_CACHE_KEY, JSON.stringify({
                    available,
                    timestamp: Date.now()
                }));

                if (available) {
                    aiStatusIcon.textContent = '✨';
                    aiStatusText.textContent = 'AI 已启动，留空的元数据将由 AI 自动填写';
                    aiStatusNotice.style.color = 'var(--color-tertiary)';
                } else {
                    aiStatusIcon.textContent = '○';
                    aiStatusText.textContent = 'AI 服务未配置，请手动填写元数据';
                    aiStatusNotice.style.color = 'var(--color-on-surface-variant)';
                }
            } catch {
                // On error, assume unavailable
                aiStatusIcon.textContent = '○';
                aiStatusText.textContent = 'AI 服务未配置，请手动填写元数据';
                aiStatusNotice.style.color = 'var(--color-on-surface-variant)';
            }
        };

        // Run AI status check on page load
        checkAIStatus();

        const activateZenMode = () => {
            document.body.classList.add('zen-active');
        };

        const deactivateZenMode = () => {
            document.body.classList.remove('zen-active');
        };

        const handlePointerMove = (e) => {
            const { clientX, clientY } = e;
            const { innerWidth, innerHeight } = window;
            const nearEdge =
                clientX < zenEdgeThreshold ||
                clientX > innerWidth - zenEdgeThreshold ||
                clientY < zenEdgeThreshold ||
                clientY > innerHeight - zenEdgeThreshold;
            if (nearEdge) {
                deactivateZenMode();
            }
        };

        if (contentField) {
            contentField.addEventListener('focus', () => {
                activateZenMode();
                window.addEventListener('pointermove', handlePointerMove);
            });

            const cleanup = () => {
                deactivateZenMode();
                window.removeEventListener('pointermove', handlePointerMove);
            };

            contentField.addEventListener('blur', cleanup);
        }

        // Title field also triggers zen mode for consistent experience
        if (titleInput) {
            titleInput.addEventListener('focus', () => {
                activateZenMode();
                window.addEventListener('pointermove', handlePointerMove);
            });

            const cleanupTitle = () => {
                deactivateZenMode();
                window.removeEventListener('pointermove', handlePointerMove);
            };

            titleInput.addEventListener('blur', cleanupTitle);
        }
    })();
</script>
{% endblock %}
