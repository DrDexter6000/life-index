{% extends "base.html" %}

{% block title %}写日志 - Life Index{% endblock %}

{% block content %}
<section class="max-w-7xl mx-auto space-y-8" id="write-page">
    <header class="space-y-3">
        <p class="type-label uppercase tracking-[0.24em]" style="color: var(--color-tertiary);">Write Journal</p>
        <h1 class="font-display text-3xl font-semibold tracking-tight sm:text-4xl" style="color: var(--color-on-surface);">写日志</h1>
        <p class="max-w-3xl text-sm sm:text-base" style="color: var(--color-on-surface-variant);">
            可以是一句感悟、一个链接，或者是一整篇日记...
        </p>
        <div class="inline-flex max-w-3xl flex-col gap-1 rounded-2xl px-4 py-3" style="background: rgba(18, 22, 30, 0.6); box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05);">
            <span class="text-sm font-medium" style="color: var(--color-on-surface);">{{ llm_status_label }}</span>
            <span class="text-xs" style="color: var(--color-on-surface-variant);">{{ llm_status_message }}</span>
        </div>
    </header>

    {% if error %}
    <div class="rounded-2xl p-4" style="background: rgba(255, 113, 108, 0.08); box-shadow: 0 0 0 1px rgba(255, 113, 108, 0.2);">
        <div class="flex items-center gap-3">
            <span class="text-xl">⚠️</span>
            <div>
                <h3 class="type-title" style="color: var(--color-error);">保存失败</h3>
                <p class="type-label" style="color: var(--color-error);">{{ error }}</p>
            </div>
        </div>
    </div>
    {% endif %}

    <article class="rounded-2xl p-6 sm:p-10" style="background: rgba(18, 22, 30, 0.82); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.28), 0 0 0 1px rgba(255, 255, 255, 0.05);">
        <form method="POST" action="/write" class="space-y-8" id="write-form" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <!-- Template Selector -->
            <div id="template-section" class="flex items-center gap-3 pb-4" style="border-bottom: 1px solid rgba(68, 72, 79, 0.1);">
                <span class="type-label" style="color: var(--color-on-surface-variant);">模板</span>
                <select id="template" class="pill px-3 py-1.5 type-body" name="template" data-templates='{{ templates_json | safe }}' style="background: var(--color-surface-container-low); border: none; color: var(--color-on-surface);">
                    {% for item in templates %}
                    <option value="{{ item.id }}" {% if selected_template == item.id %}selected{% endif %}>{{ item.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Title Input -->
            <div>
                <input
                    id="title"
                    name="title"
                    type="text"
                    value="{{ title }}"
                    placeholder="给这篇记录起个名字..."
                    class="w-full type-heading py-2"
                    style="color: var(--color-on-surface); background: transparent; border: none; border-bottom: 1px solid rgba(68, 72, 79, 0.2); outline: none; transition: border-color 0.2s;"
                    autocomplete="off"
                >
            </div>

            <!-- Content Textarea -->
            <div>
                <textarea
                    id="content"
                    name="content"
                    rows="12"
                    required
                    placeholder="今天发生了什么？写下你的想法、感受、经历..."
                    class="w-full rounded-2xl px-4 py-4 type-body"
                    style="line-height: 1.8; resize: vertical; min-height: 280px; background: var(--color-surface-container-low); border: 1px solid rgba(68, 72, 79, 0.15); color: var(--color-on-surface);"
                >{{ content }}</textarea>
            </div>

            <!-- Metadata Grid -->
            <div id="metadata-section" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
                <!-- Topic -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">主题</label>
                    <select id="topic" name="topic" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                        <option value="" style="color: var(--color-on-surface-variant);">自动判断</option>
                        <option value="work" {% if topic == 'work' %}selected{% endif %}>工作</option>
                        <option value="learn" {% if topic == 'learn' %}selected{% endif %}>学习</option>
                        <option value="health" {% if topic == 'health' %}selected{% endif %}>健康</option>
                        <option value="relation" {% if topic == 'relation' %}selected{% endif %}>关系</option>
                        <option value="think" {% if topic == 'think' %}selected{% endif %}>思考</option>
                        <option value="create" {% if topic == 'create' %}selected{% endif %}>创作</option>
                        <option value="life" {% if topic == 'life' %}selected{% endif %}>生活</option>
                    </select>
                </div>

                <!-- Mood -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">心情</label>
                    <input id="mood" name="mood" type="text" value="{{ mood }}" placeholder="{% if llm_available %}留空则由 AI 自动生成{% else %}请手动填写（启用 AI 可自动生成）{% endif %}" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                </div>

                <!-- Tags -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">标签</label>
                    <input id="tags" name="tags" type="text" value="{{ tags }}" placeholder="{% if llm_available %}留空则由 AI 自动生成{% else %}请手动填写（启用 AI 可自动生成）{% endif %}" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                </div>

                <!-- People -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">人物</label>
                    <input id="people" name="people" type="text" value="{{ people }}" placeholder="{% if llm_available %}留空则由 AI 自动生成{% else %}请手动填写（启用 AI 可自动生成）{% endif %}" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                </div>

                <!-- Location -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">地点</label>
                    <div class="flex items-center gap-2">
                        <input id="location" name="location" type="text" value="{{ location }}" placeholder="如：Beijing, China" class="block w-full flex-1 rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                        <button id="geolocation-btn" type="button" data-idle-text="<< 查询" class="px-3 py-2 rounded-full text-sm font-medium transition-all" style="background: var(--color-surface-container-high); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface-variant); height: 44px; white-space: nowrap;" onmouseover="this.style.background='var(--color-surface-bright)'; this.style.boxShadow='inset 0 0 0 1px var(--color-primary)'" onmouseout="this.style.background='var(--color-surface-container-high)'; this.style.boxShadow='inset 0 0 0 1px rgba(68, 72, 79, 0.15)'"><< 查询</button>
                    </div>
                    <p class="mt-1 text-xs" style="color: var(--color-on-surface-variant);">如不填写地点和天气，将使用默认地点并查询天气数据</p>
                </div>

                <!-- Weather -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">天气</label>
                    <div class="flex items-center gap-2">
                        <input id="weather" name="weather" type="text" value="{{ weather }}" placeholder="如：晴天 28°C" class="flex-1 rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                        <button id="weather-btn" type="button" data-idle-text="<< 查询" class="px-3 py-2 rounded-full text-sm font-medium transition-all" style="background: var(--color-surface-container-high); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface-variant); height: 44px; white-space: nowrap;" onmouseover="this.style.background='var(--color-surface-bright)'; this.style.boxShadow='inset 0 0 0 1px var(--color-primary)'" onmouseout="this.style.background='var(--color-surface-container-high)'; this.style.boxShadow='inset 0 0 0 1px rgba(68, 72, 79, 0.15)'"><< 查询</button>
                    </div>
                    <p id="weather-status" class="mt-1 text-xs" style="color: var(--color-on-surface-variant);"></p>
                </div>

                <!-- Date -->
                <div>
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">日期</label>
                    <input id="date" name="date" type="datetime-local" value="{{ date }}" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                </div>

                <!-- Project -->
                <div class="sm:col-span-2 lg:col-span-2">
                    <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-on-surface);">项目</label>
                    <input id="project" name="project" type="text" value="{{ project }}" placeholder="{% if llm_available %}留空则由 AI 自动生成{% else %}请手动填写（启用 AI 可自动生成）{% endif %}" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface-container-low); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                </div>
            </div>

            <!-- Attachments -->
            <div id="attachments-section" class="rounded-xl p-5" style="background: var(--color-surface-container-low); box-shadow: 0 0 0 1px rgba(68, 72, 79, 0.1);">
                <h3 class="font-display text-xl font-medium tracking-tight mb-4" style="color: var(--color-on-surface);">附件</h3>

                <!-- Local files -->
                <div class="mb-4">
                    <input
                        id="local-file-input"
                        type="file"
                        name="attachments"
                        multiple
                        class="block w-full type-body file-upload-styled"
                        style="color: var(--color-on-surface-variant);"
                    >
                </div>

                <!-- URL inputs -->
                <div>
                    <div id="url-inputs" class="space-y-2">
                        <input type="url" name="attachment_urls" placeholder="https://example.com/image.jpg" class="w-full rounded-full px-4 py-2.5 text-sm" style="background: var(--color-surface); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);">
                    </div>
                    <button id="add-url-btn" type="button" class="mt-2 type-label" style="color: var(--color-primary); background: none; border: none; cursor: pointer;">+ 添加更多</button>
                </div>
            </div>

            <!-- Submit Area -->
            <div id="submit-section" class="flex flex-col gap-3 pt-4 sm:flex-row sm:items-center sm:gap-4" style="border-top: 1px solid rgba(68, 72, 79, 0.1);">
                <button id="submit-btn" type="submit" data-idle-text="保存日志" class="inline-flex min-h-[46px] items-center justify-center rounded-full px-6 py-3 text-sm font-medium transition-transform active:scale-95" style="background: var(--color-primary); color: var(--color-background); box-shadow: 0 12px 28px rgba(255, 231, 146, 0.18);">
                    保存日志
                </button>
                <p id="form-status" class="type-label" style="color: var(--color-on-surface-variant);"></p>
            </div>
        </form>
    </article>
</section>

<style>
    /* Styled file input */
    .file-upload-styled::file-selector-button {
        background-color: var(--color-surface-container-high);
        color: var(--color-on-surface-variant);
        border: none;
        border-radius: 9999px;
        padding: 8px 16px;
        font-size: 0.75rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        margin-right: 12px;
        box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15);
    }

    .file-upload-styled::file-selector-button:hover {
        background-color: var(--color-surface-bright);
        box-shadow: inset 0 0 0 1px var(--color-primary);
    }
</style>

<script>
    (() => {
        const templateSelector = document.getElementById('template');
        const contentField = document.getElementById('content');
        const topicField = document.getElementById('topic');
        const geolocationBtn = document.getElementById('geolocation-btn');
        const weatherBtn = document.getElementById('weather-btn');
        const locationField = document.getElementById('location');
        const weatherField = document.getElementById('weather');
        const weatherStatus = document.getElementById('weather-status');
        const dateField = document.getElementById('date');
        const localFileInput = document.getElementById('local-file-input');
        const writeForm = document.getElementById('write-form');
        const submitBtn = document.getElementById('submit-btn');
        const formStatus = document.getElementById('form-status');
        const urlInputs = document.getElementById('url-inputs');
        const addUrlBtn = document.getElementById('add-url-btn');

        const setButtonBusy = (button, busyText, isBusy) => {
            if (!button) return;
            const idleText = button.dataset.idleText || button.textContent || '';
            if (!button.dataset.idleText) button.dataset.idleText = idleText;
            button.disabled = isBusy;
            button.textContent = isBusy ? busyText : idleText;
            button.style.opacity = isBusy ? '0.5' : '';
            button.style.cursor = isBusy ? 'not-allowed' : '';
        };

        const setWeatherStatus = (message, isError = false) => {
            if (!weatherStatus) return;
            weatherStatus.textContent = message;
            weatherStatus.style.color = isError ? 'var(--color-error)' : 'var(--color-on-surface-variant)';
        };

        const setFormStatus = (message, isError = false) => {
            if (!formStatus) return;
            formStatus.textContent = message;
            formStatus.style.color = isError ? 'var(--color-error)' : 'var(--color-on-surface-variant)';
        };

        const updateAttachmentStatus = () => {
            if (!urlInputs) return;
        };

        const buildUrlInput = () => {
            const row = document.createElement('div');
            row.className = 'flex gap-2';

            const input = document.createElement('input');
            input.type = 'url';
            input.name = 'attachment_urls';
            input.placeholder = 'https://example.com/image.jpg';
            input.className = 'flex-1 rounded-full px-4 py-2.5 text-sm';
            input.style.cssText = 'background: var(--color-surface); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface);';

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'px-3 py-2 rounded-full text-sm font-medium';
            removeBtn.style.cssText = 'background: var(--color-surface-container-high); border: none; box-shadow: inset 0 0 0 1px rgba(68, 72, 79, 0.15); color: var(--color-on-surface-variant); cursor: pointer;';
            removeBtn.textContent = '移除';
            removeBtn.addEventListener('click', () => {
                row.remove();
                if (urlInputs && urlInputs.children.length === 0) {
                    urlInputs.appendChild(buildUrlInput());
                }
            });

            row.appendChild(input);
            row.appendChild(removeBtn);
            return row;
        };

        const fetchWeatherForLocation = async () => {
            const location = locationField ? locationField.value.trim() : '';
            if (!location || !weatherField) {
                setWeatherStatus('请先填写地点', true);
                return false;
            }

            setButtonBusy(weatherBtn, '查询中...', true);
            setWeatherStatus('正在查询...');

            try {
                const params = new URLSearchParams({ location });
                if (dateField && dateField.value) params.set('date', dateField.value);

                const response = await fetch(`/api/weather?${params.toString()}`);
                const result = await response.json();
                if (result.success && result.weather) {
                    weatherField.value = result.weather;
                    setWeatherStatus('已填充');
                    return true;
                }
                setWeatherStatus(result.error || '查询失败', true);
                return false;
            } catch {
                setWeatherStatus('查询失败', true);
                return false;
            } finally {
                setButtonBusy(weatherBtn, '查询中...', false);
            }
        };

        if (locationField && weatherField) {
            locationField.addEventListener('input', () => {
                weatherField.value = '';
                setWeatherStatus('地点已更新');
            });
        }

        if (templateSelector && contentField && topicField) {
            const templates = JSON.parse(templateSelector.dataset.templates || '[]');
            templateSelector.addEventListener('change', () => {
                const selected = templates.find((item) => item.id === templateSelector.value);
                if (!selected) return;

                const existingContent = contentField.value.trim();
                const existingTopic = topicField.value.trim();
                if ((existingContent || existingTopic) && !confirm('切换模板可能覆盖未保存内容，是否继续？')) return;

                contentField.value = selected.content || '';
                if (Array.isArray(selected.topic) && selected.topic.length > 0) {
                    topicField.value = selected.topic[0];
                }
            });
        }

        if (geolocationBtn && locationField) {
            geolocationBtn.addEventListener('click', () => {
                if (!navigator.geolocation) {
                    alert('位置信息获取失败');
                    return;
                }

                setButtonBusy(geolocationBtn, '定位中...', true);
                setWeatherStatus('正在定位...');

                navigator.geolocation.getCurrentPosition(
                    async ({ coords }) => {
                        const fallback = `${coords.latitude.toFixed(4)}, ${coords.longitude.toFixed(4)}`;
                        try {
                            const params = new URLSearchParams({ lat: coords.latitude.toString(), lon: coords.longitude.toString() });
                            const response = await fetch(`/api/reverse-geocode?${params.toString()}`);
                            const result = await response.json();
                            locationField.value = result.success && result.location ? result.location : fallback;
                        } catch {
                            locationField.value = fallback;
                        }
                        if (weatherField) weatherField.value = '';
                        await fetchWeatherForLocation();
                        setButtonBusy(geolocationBtn, '定位中...', false);
                    },
                    () => {
                        setButtonBusy(geolocationBtn, '定位中...', false);
                        setWeatherStatus('定位失败', true);
                        alert('位置信息获取失败');
                    }
                );
            });
        }

        if (weatherBtn) {
            weatherBtn.addEventListener('click', async () => {
                const ok = await fetchWeatherForLocation();
                if (!ok && locationField && !locationField.value.trim()) alert('请先填写地点');
            });
        }

        if (addUrlBtn && urlInputs) {
            addUrlBtn.addEventListener('click', () => {
                urlInputs.appendChild(buildUrlInput());
            });
        }

        if (urlInputs) {
            const existingInputs = Array.from(urlInputs.querySelectorAll('input[name="attachment_urls"]'));
            existingInputs.forEach((input) => {
                if (input.parentElement === urlInputs) {
                    const row = buildUrlInput();
                    const replacementInput = row.querySelector('input[name="attachment_urls"]');
                    if (replacementInput) replacementInput.value = input.value;
                    input.replaceWith(row);
                }
            });
        }

        if (writeForm && submitBtn) {
            writeForm.addEventListener('submit', () => {
                setButtonBusy(submitBtn, '保存中...', true);
                setFormStatus('正在保存...');
            });
        }

        /* ============================
           Zen Typing Mode (沉浸输入态)
           DESIGN-DIRECTION §3.2
           ============================ */
        const zenEdgeThreshold = 20;
        const titleInput = document.getElementById('title');

        const enterZen = () => {
            document.body.classList.add('zen-active');
        };

        const exitZen = () => {
            document.body.classList.remove('zen-active');
        };

        const isZenActive = () => document.body.classList.contains('zen-active');

        if (contentField) {
            contentField.addEventListener('focus', enterZen);
            contentField.addEventListener('blur', (e) => {
                setTimeout(() => {
                    const active = document.activeElement;
                    if (active !== contentField && active !== titleInput) {
                        exitZen();
                    }
                }, 50);
            });
        }

        if (titleInput) {
            titleInput.addEventListener('focus', enterZen);
            titleInput.addEventListener('blur', (e) => {
                setTimeout(() => {
                    const active = document.activeElement;
                    if (active !== contentField && active !== titleInput) {
                        exitZen();
                    }
                }, 50);
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isZenActive()) {
                exitZen();
                if (contentField) contentField.blur();
                if (titleInput) titleInput.blur();
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isZenActive()) return;
            const x = e.clientX;
            const y = e.clientY;
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (x <= zenEdgeThreshold || x >= w - zenEdgeThreshold || y <= zenEdgeThreshold || y >= h - zenEdgeThreshold) {
                exitZen();
            }
        });
    })();
</script>
{% endblock %}
